<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>

    <div class="calc">
 
        <h1 class="screen"></h1>

        <div class = "btn">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="feat">+</button>
        </div>

        <div class = "btn">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="feat">-</button>
        </div>

        <div class = "btn">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="feat">x</button>
        </div>

        <div class = "btn">
            <button class="feat">C</button>
            <button>0</button>
            <button class="feat">=</button>
            <button class="feat">/</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
